apiVersion: apps/v1 
kind: Deployment 
metadata: 
name: java-leave-app-deployment 
labels: 
app: java-leave-app 
spec: 
replicas: 2 
selector: 
matchLabels: 
app: java-leave-app 
template: 
metadata: 
labels: 

        app: java-leave-app 
    spec: 
      containers: 
        - name: java-leave-app 
          image: karansumathi01/java-leave-app:latest 
          imagePullPolicy: Always 
          ports: 
            - containerPort: 8080 
 
          resources: 
            requests: 
              memory: "256Mi" 
              cpu: "250m" 
            limits: 
              memory: "512Mi" 
              cpu: "500m" 
 
          livenessProbe: 
            tcpSocket: 
              port: 8080 
            initialDelaySeconds: 30 
            periodSeconds: 10 
 
          readinessProbe: 
            tcpSocket: 
              port: 8080 
            initialDelaySeconds: 10 
            periodSeconds: 5 
 --- 
apiVersion: v1 
kind: Service 
metadata: 
name: java-leave-app-service 
spec: 
type: NodePort 
selector: 
app: java-leave-app 
ports: - protocol: TCP 
port: 80 
targetPort: 8080 
nodePort: 30007 